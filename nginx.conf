server {
    listen 80;
    listen [::]:80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Astro builds /about/ as /about/index.html etc.
    # try_files: file → directory (with index) → 404
    location / {
        try_files $uri $uri/ $uri/index.html =404;
    }

    # Long cache for hashed assets (Astro emits content-hashed filenames in /_astro/)
    location /_astro/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Short cache for images and other static assets
    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif|woff|woff2|ttf|eot)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # No cache for HTML (so deploys propagate immediately)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
